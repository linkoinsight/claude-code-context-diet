name: Publish to npm

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    # Skip until an npm account is wired. Set the repo variable
    # NPM_PUBLISH_ENABLED=true (Settings → Variables → Actions) to enable.
    if: vars.NPM_PUBLISH_ENABLED == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          registry-url: https://registry.npmjs.org
      - run: npm test
      - run: npm publish --access public --provenance
