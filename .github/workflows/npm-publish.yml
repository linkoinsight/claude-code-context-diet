name: Publish to npm

# Auto-publishes on release. Uses NPM_TOKEN repo secret (Casper-managed).
# Trusted publishing via OIDC is not yet configured on npmjs.com; once it is,
# remove NODE_AUTH_TOKEN below and re-add `--provenance` to the publish step.
on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    if: vars.NPM_PUBLISH_ENABLED == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          registry-url: https://registry.npmjs.org
      - run: npm test
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
