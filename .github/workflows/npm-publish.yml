name: Publish to npm

# Manual-only until trusted publishing is configured on npmjs.com.
# Casper publishes the package directly from the VPS using NPM_TOKEN; this
# workflow exists for the future once the package is registered as a Trusted
# Publisher (npmjs.com -> package settings -> Trusted Publishers -> add
# linkoinsight/claude-code-context-diet + .github/workflows/npm-publish.yml).
on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    # Skip until an npm account is wired. Set the repo variable
    # NPM_PUBLISH_ENABLED=true (Settings → Variables → Actions) to enable.
    if: vars.NPM_PUBLISH_ENABLED == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          registry-url: https://registry.npmjs.org
      - run: npm test
      - run: npm publish --access public --provenance
